services:
  db:
    image: postgres:15
    container_name: system_monitoring_db
    environment:
      POSTGRES_USER: monitoring_user # database username
      POSTGRES_PASSWORD: mntusr-pass-3517 # database password
      POSTGRES_DB: monitoring_db # database name
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  grafana:
    image: grafana/grafana-enterprise:12.4.1
    container_name: grafana_enterprise
    ports:
      - "3000:3000"
    volumes:
      - "grafana_storage:/var/lib/grafana"
    restart: unless-stopped
    depends_on:
      - db

volumes:
  pgdata:
  grafana_storage: